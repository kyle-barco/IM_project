version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: bytemarket_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bytemarket_db
    ports:
      - "5432:5432"
    volumes:
      - bytemarket_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  bytemarket_pgdata:
