services:
  - type: web
    name: bytemarket
    runtime: node
    repo: https://github.com/YOUR_USERNAME/bytemarket
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /health
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push --accept-data-loss && node src/app.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bytemarket-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: bytemarket
          type: web
          property: url

databases:
  - name: bytemarket-db
    plan: free
    region: singapore
    databaseName: bytemarket_db
